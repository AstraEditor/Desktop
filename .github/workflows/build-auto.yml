name: Build (Auto)

on:
  push:
  pull_request:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        persist-credentials: false
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: 'npm'
    
    - name: Install strip-nondeterminism
      run: sudo apt-get install strip-nondeterminism
    
    - name: Build project
      run: |
        export CI="true"
        npm ci --no-audit --no-fund
        npm run build-simplified
      shell: bash
    
    - name: Package
      run: |
        echo "Packaging for Linux..."
        node release-automation/build.mjs --debian --tarball --appimage --x64 --armv7l --arm64 || echo "Linux packaging may have warnings"
      shell: bash
    
    - name: Print file tree
      run: node scripts/print-file-tree.mjs dist
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: linux
        path: |
          dist/*.deb
          dist/*.tar.gz
          dist/*.AppImage

  build-mac:
    runs-on: macos-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        persist-credentials: false
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: 'npm'
    
    - name: Build project
      run: |
        export CI="true"
        npm ci --no-audit --no-fund
        npm run build-simplified
      shell: bash
    
    - name: Package
      run: |
        echo "Packaging for macOS..."
        # Skip code signing to avoid codesign errors in CI
        export CSC_IDENTITY=
        export CSC_NAME=
        
        node release-automation/build.mjs --mac --universal --production || echo "Universal build may have warnings"
        node release-automation/build.mjs --mac-legacy-11 --universal --production || echo "Legacy 11 build may have warnings"
        node release-automation/build.mjs --mac-legacy-10.13-10.14 --mac-legacy-10.15 --x64 || echo "Legacy build may have warnings"
      shell: bash
    
    - name: Print file tree
      run: node scripts/print-file-tree.mjs dist
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: mac
        path: dist/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        persist-credentials: false
      path: repo
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24
    
    - name: Move repository to D: drive
      run: |
        Copy-Item -Path repo -Destination D:\repo -Recurse
        Remove-Item -Path repo -Recurse -Force
    
    - name: Configure npm to use D: drive
      run: |
        npm config set cache D:\npm-cache
        npm config set prefix D:\npm-prefix
    
    - name: Build project
      run: |
        cd D:\repo
        $env:CI = "true"
        npm ci --no-audit --no-fund --cache D:\npm-cache
        npm run build-simplified
      shell: powershell
    
    - name: Package
      run: |
        cd D:\repo
        Write-Host "Packaging for Windows..."
        
        # Skip code signing for Microsoft Store builds in CI
        $env:CSC_IDENTITY=""
        $env:CSC_NAME=""
        
        try {
          Write-Host "Building Windows Microsoft Store versions..."
          node release-automation/build.mjs --windows --microsoft-store --x64 --ia32 --arm64
        } catch {
          Write-Host "Microsoft Store build may have warnings, continuing..."
        }
        
        try {
          Write-Host "Building Windows portable version..."
          node release-automation/build.mjs --windows-portable --x64
        } catch {
          Write-Host "Portable build may have warnings, continuing..."
        }
        
        try {
          Write-Host "Building Windows legacy versions..."
          node release-automation/build.mjs --windows-legacy --ia32 --x64
        } catch {
          Write-Host "Legacy build may have warnings, continuing..."
        }
      shell: powershell
    
    - name: Print file tree
      run: |
        cd D:\repo
        node scripts/print-file-tree.mjs dist
      shell: powershell
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows
        path: |
          D:\repo\dist\*.exe
          D:\repo\dist\*.appx