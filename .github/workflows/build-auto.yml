    - name: Install and build scratch-vm
      run: |
        REPO_PARENT="$(dirname $GITHUB_WORKSPACE)"
        cd "${REPO_PARENT}/scratch-vm"
        
        echo "Installing scratch-vm dependencies..."
        npm ci --no-audit --no-fund
        
        echo "Building scratch-vm..."
        npm run build
        
        echo "Creating npm link for scratch-vm..."
