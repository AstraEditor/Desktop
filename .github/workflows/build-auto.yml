name: Build (Auto)

on:
  push:
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            platform: linux
            artifact-name: build-output-linux
          - os: windows-latest
            platform: win
            artifact-name: build-output-windows
          - os: macos-latest
            platform: mac
            artifact-name: build-output-mac
    
    runs-on: ${{ matrix.os }}
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        persist-credentials: false
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: 'npm'
    
    - name: Setup environment variables
      run: |
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          echo "WORKSPACE_PARENT=$(dirname $GITHUB_WORKSPACE)" >> $GITHUB_ENV
        else
          echo "WORKSPACE_PARENT=$(dirname $GITHUB_WORKSPACE)" >> $GITHUB_ENV
        fi
      shell: bash
    
    # Validate all package.json files before cloning
    - name: Validate package.json files
      run: |
        REPO_PARENT="${{ env.WORKSPACE_PARENT }}"
        
        # Function to validate package.json
        validate_package_json() {
          local package_path=$1
          if [ -f "$package_path" ]; then
            echo "Validating $package_path..."
            node -e "
              try {
                const pkg = require('$package_path');
                if (!pkg.name || !pkg.version) {
                  console.error('Missing name or version in $package_path');
                  process.exit(1);
                }
                // Validate version format
                if (!/^[0-9]+\.[0-9]+\.[0-9]+/.*/.test(pkg.version)) {
                  console.error('Invalid version format in $package_path: ' + pkg.version);
                  process.exit(1);
                }
                console.log('✓ $package_path is valid');
              } catch (e) {
                console.error('Error parsing $package_path:', e.message);
                process.exit(1);
              }
            "
          fi
        }
        
        # Validate Desktop package.json
        validate_package_json "package.json"
        
        # Function to clone and validate repository
        clone_and_validate() {
          local repo_name=$1
          local repo_url="https://github.com/AstraEditor/${repo_name}.git"
          local repo_path="${REPO_PARENT}/${repo_name}"
          
          echo "Cloning ${repo_name}..."
          git clone --depth 1 "$repo_url" "$repo_path"
          
          if [ -f "$repo_path/package.json" ]; then
            validate_package_json "$repo_path/package.json"
          else
            echo "Warning: ${repo_name}/package.json not found"
          fi
        }
        
        # Clone and validate all repositories
        clone_and_validate "scratch-gui"
        clone_and_validate "scratch-vm"
        clone_and_validate "scratch-audio"
        clone_and_validate "scratch-blocks"
        clone_and_validate "scratch-paint"
        clone_and_validate "scratch-render"
        
        echo "All package.json files validated successfully"
      shell: bash
    
    # Install scratch-gui dependencies first (core dependency)
    - name: Install scratch-gui dependencies
      run: |
        cd "${{ env.WORKSPACE_PARENT }}/scratch-gui"
        
        echo "Installing scratch-gui dependencies..."
        npm ci --no-audit --no-fund
        
        echo "scratch-gui dependencies installed successfully"
      shell: bash
    
    # Install other scratch dependencies in parallel
    - name: Install scratch dependencies
      run: |
        REPO_PARENT="${{ env.WORKSPACE_PARENT }}"
        
        # Function to install dependencies
        install_deps() {
          local repo_name=$1
          local repo_path="${REPO_PARENT}/${repo_name}"
          
          if [ -d "$repo_path" ] && [ -f "$repo_path/package.json" ]; then
            echo "Installing ${repo_name} dependencies..."
            cd "$repo_path"
            npm ci --no-audit --no-fund
            echo "${repo_name} dependencies installed successfully"
          fi
        }
        
        # Install dependencies in parallel
        install_deps "scratch-vm" &
        install_deps "scratch-audio" &
        install_deps "scratch-blocks" &
        install_deps "scratch-paint" &
        install_deps "scratch-render" &
        
        # Wait for all installations to complete
        wait
        
        echo "All scratch dependencies installed"
      shell: bash
    
    # Install Desktop dependencies
    - name: Install Desktop dependencies
      run: |
        echo "Installing Desktop dependencies..."
        npm ci --no-audit --no-fund
        
        echo "Preparing extensions..."
        npm run prepare-extensions
        
        echo "Desktop dependencies installed successfully"
      shell: bash
    
    # Create required directories
    - name: Create build directories
      run: |
        mkdir -p dist-library-files dist-extensions dist-renderer-webpack
      shell: bash
    
    # Fetch library files
    - name: Fetch library files
      run: |
        echo "Fetching library files..."
        npm run fetch
        echo "Library files fetched successfully"
      shell: bash
    
    # Compile with increased memory
    - name: Compile
      run: |
        echo "Starting webpack compilation..."
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          $env:NODE_OPTIONS="--max-old-space-size=4096"
        else
          export NODE_OPTIONS="--max-old-space-size=4096"
        fi
        
        npm run webpack:compile
        
        echo "Webpack compilation completed successfully"
      shell: bash
    
    # Package for the specific platform
    - name: Package
      run: |
        echo "Packaging for ${{ matrix.platform }}..."
        
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          npm run electron:package -- --win --publish never
        elif [ "${{ matrix.os }}" = "macos-latest" ]; then
          npm run electron:package -- --mac --publish never
        else
          npm run electron:package -- --linux --publish never
        fi
        
        echo "Packaging completed successfully"
      shell: bash
    
    # Upload artifacts
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ${{ matrix.artifact-name }}
        path: |
          dist/
        retention-days: 7