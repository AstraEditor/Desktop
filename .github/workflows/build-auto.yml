          local repo_name=$1
          local repo_url="https://github.com/AstraEditor/${repo_name}.git"
          local repo_path="${REPO_PARENT}/${repo_name}"
          
          echo "Cloning ${repo_name}..."
          git clone --depth 1 --single-branch "$repo_url" "$repo_path"
        }
        
        # Clone all required repositories
        clone_repo "scratch-gui"
        clone_repo "scratch-vm"
        clone_repo "scratch-audio"
        clone_repo "scratch-blocks"
        clone_repo "scratch-paint"
