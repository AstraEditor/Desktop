name: Build (Auto)

on:
  push:
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            platform: linux
            artifact-name: build-output-linux
          - os: windows-latest
            platform: win
            artifact-name: build-output-windows
          - os: macos-latest
            platform: mac
            artifact-name: build-output-mac
    
    runs-on: ${{ matrix.os }}
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        persist-credentials: false
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: 'npm'
    
    - name: Setup environment variables
      run: |
        if [ "${{ runner.os }}" = "Windows" ]; then
          echo "WORKSPACE_PARENT=$(dirname $GITHUB_WORKSPACE)" >> $GITHUB_ENV
        else
          echo "WORKSPACE_PARENT=$(dirname $GITHUB_WORKSPACE)" >> $GITHUB_ENV
        fi
      shell: bash
    
    # Clone scratch repositories first
    - name: Clone scratch repositories
      run: |
        REPO_PARENT="${{ env.WORKSPACE_PARENT }}"
        
        # Function to clone repository
        clone_repo() {
          local repo_name=$1
          local repo_url="https://github.com/AstraEditor/${repo_name}.git"
          local repo_path="${REPO_PARENT}/${repo_name}"
          
          echo "Cloning ${repo_name}..."
          git clone --depth 1 "$repo_url" "$repo_path"
        }
        
        # Clone all required repositories
        clone_repo "scratch-gui"
        clone_repo "scratch-vm"
        clone_repo "scratch-audio"
        clone_repo "scratch-blocks"
        clone_repo "scratch-paint"
        clone_repo "scratch-render"
        
        echo "All repositories cloned successfully"
      shell: bash
    
    # Validate all package.json files after cloning
    - name: Validate package.json files
      run: |
        REPO_PARENT="${{ env.WORKSPACE_PARENT }}"
        
        # Validate Desktop package.json
        node scripts/validate-package.js package.json
        
        # Validate scratch repositories
        repos=("scratch-gui" "scratch-vm" "scratch-audio" "scratch-blocks" "scratch-paint" "scratch-render")
        for repo in "${repos[@]}"; do
          package_path="${REPO_PARENT}/${repo}/package.json"
          if [ -f "$package_path" ]; then
            node scripts/validate-package.js "$package_path"
          else
            echo "Warning: ${repo}/package.json not found"
          fi
        done
        
        echo "All package.json files validated successfully"
      shell: bash
    
    # Install scratch-gui dependencies first (core dependency)
    - name: Install scratch-gui dependencies
      run: |
        cd "${{ env.WORKSPACE_PARENT }}/scratch-gui"
        
        echo "Installing scratch-gui dependencies..."
        npm ci --no-audit --no-fund
        
        echo "scratch-gui dependencies installed successfully"
      shell: bash
    
    # Install and build other scratch dependencies in parallel
    - name: Install and build scratch dependencies
      run: |
        REPO_PARENT="${{ env.WORKSPACE_PARENT }}"
        
        # Function to install and build dependencies
        install_and_build_deps() {
          local repo_name=$1
          local repo_path="${REPO_PARENT}/${repo_name}"
          
          if [ -d "$repo_path" ] && [ -f "$repo_path/package.json" ]; then
            echo "Installing ${repo_name} dependencies..."
            cd "$repo_path"
            npm ci --no-audit --no-fund
            echo "${repo_name} dependencies installed successfully"
            
            # Build the module if it has a build script
            if [ "$repo_name" = "scratch-audio" ]; then
              echo "Building ${repo_name}..."
              npm run build
            elif [ "$repo_name" = "scratch-blocks" ]; then
              echo "Building ${repo_name}..."
              npm run prepublish
            elif [ "$repo_name" = "scratch-paint" ]; then
              echo "Building ${repo_name}..."
              npm run build
            elif [ "$repo_name" = "scratch-render" ]; then
              echo "Building ${repo_name}..."
              npm run build
            elif [ "$repo_name" = "scratch-vm" ]; then
              echo "Building ${repo_name}..."
              npm run build
            fi
            
            # Create npm link
            echo "Creating npm link for ${repo_name}..."
            npm link
            echo "${repo_name} built and linked successfully"
          fi
        }
        
        # Install and build dependencies in parallel
        install_and_build_deps "scratch-vm" &
        install_and_build_deps "scratch-audio" &
        install_and_build_deps "scratch-blocks" &
        install_and_build_deps "scratch-paint" &
        install_and_build_deps "scratch-render" &
        
        # Wait for all installations and builds to complete
        wait
        
        echo "All scratch dependencies installed and built"
      shell: bash
    
    # Link scratch modules to scratch-gui
    - name: Link scratch modules to scratch-gui
      run: |
        cd "${{ env.WORKSPACE_PARENT }}/scratch-gui"
        echo "Linking scratch modules to scratch-gui..."
        npm link scratch-audio scratch-blocks scratch-paint scratch-render scratch-vm
        echo "All scratch modules linked successfully"
      shell: bash
    
    # Install Desktop dependencies
    - name: Install Desktop dependencies
      run: |
        echo "Installing Desktop dependencies..."
        npm ci --no-audit --no-fund
        
        echo "Preparing extensions..."
        if [ "${{ runner.os }}" = "Windows" ]; then
          echo "Using optimized extension preparation for Windows..."
          npm run prepare-extensions-optimized
        else
          npm run prepare-extensions
        fi
        
        echo "Desktop dependencies installed successfully"
      shell: bash
    
    # Create required directories
    - name: Create build directories
      run: |
        mkdir -p dist-library-files dist-extensions dist-renderer-webpack
      shell: bash
    
    # Fetch library files
    - name: Fetch library files
      run: |
        echo "Fetching library files..."
        npm run fetch
        echo "Library files fetched successfully"
      shell: bash
    
    # Compile with increased memory
    - name: Compile
      run: |
        echo "Starting webpack compilation..."
        if [ "${{ runner.os }}" = "Windows" ]; then
          export NODE_OPTIONS="--max-old-space-size=4096"
        else
          export NODE_OPTIONS="--max-old-space-size=4096"
        fi
        
        npm run webpack:compile
        
        echo "Webpack compilation completed successfully"
      shell: bash
    
    # Package for the specific platform
    - name: Package
      run: |
        echo "Packaging for ${{ matrix.platform }}..."
        
        if [ "${{ runner.os }}" = "Windows" ]; then
          npm run electron:package -- --win --publish never
        elif [ "${{ runner.os }}" = "macOS" ]; then
          npm run electron:package -- --mac --publish never
        else
          npm run electron:package -- --linux --publish never
        fi
        
        echo "Packaging completed successfully"
      shell: bash
    
    # Upload artifacts
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ${{ matrix.artifact-name }}
        path: |
          dist/
        retention-days: 7