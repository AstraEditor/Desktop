name: Build (Auto)

on:
  push:
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            platform: linux
            artifact-name: build-output-linux
          - os: windows-latest
            platform: win
            artifact-name: build-output-windows
          - os: macos-latest
            platform: mac
            artifact-name: build-output-mac
    
    runs-on: ${{ matrix.os }}
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        persist-credentials: false
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: 'npm'
    
    - name: Setup environment variables
      run: |
        if [ "${{ runner.os }}" = "Windows" ]; then
          echo "WORKSPACE_PARENT=$(dirname $GITHUB_WORKSPACE)" >> $GITHUB_ENV
        else
          echo "WORKSPACE_PARENT=$(dirname $GITHUB_WORKSPACE)" >> $GITHUB_ENV
        fi
      shell: bash
    
    # Clone scratch repositories first with caching
    - name: Clone scratch repositories
      run: |
        REPO_PARENT="${{ env.WORKSPACE_PARENT }}"
        
        # Function to clone repository with optimizations
        clone_repo() {
          local repo_name=$1
          local repo_url="https://github.com/AstraEditor/${repo_name}.git"
          local repo_path="${REPO_PARENT}/${repo_name}"
          
          echo "Cloning ${repo_name} with optimizations..."
          # Use shallow clone with single branch for speed
          git clone --depth 1 --single-branch "$repo_url" "$repo_path"
        }
        
        # Clone all required repositories
        echo "Starting parallel repository cloning..."
        clone_repo "scratch-gui" &
        clone_repo "scratch-vm" &
        clone_repo "scratch-audio" &
        clone_repo "scratch-blocks" &
        clone_repo "scratch-paint" &
        clone_repo "scratch-render" &
        
        # Wait for all cloning to complete
        wait
        
        echo "All repositories cloned successfully"
      shell: bash
    
    # Validate all package.json files after cloning
    - name: Validate package.json files
      run: |
        REPO_PARENT="${{ env.WORKSPACE_PARENT }}"
        
        # Validate Desktop package.json
        node scripts/validate-package.js package.json
        
        # Validate scratch repositories
        repos=("scratch-gui" "scratch-vm" "scratch-audio" "scratch-blocks" "scratch-paint" "scratch-render")
        for repo in "${repos[@]}"; do
          package_path="${REPO_PARENT}/${repo}/package.json"
          if [ -f "$package_path" ]; then
            node scripts/validate-package.js "$package_path"
          else
            echo "Warning: ${repo}/package.json not found"
          fi
        done
        
        echo "All package.json files validated successfully"
      shell: bash
    
    # Install scratch-gui dependencies first (core dependency)
    - name: Install scratch-gui dependencies
      run: |
        cd "${{ env.WORKSPACE_PARENT }}/scratch-gui"
        
        echo "Installing scratch-gui dependencies..."
        npm ci --no-audit --no-fund
        
        echo "scratch-gui dependencies installed successfully"
      shell: bash
    
    # Install and build scratch-vm first with aggressive optimizations
    - name: Install and build scratch-vm
      timeout-minutes: 45
      run: |
        REPO_PARENT="${{ env.WORKSPACE_PARENT }}"
        repo_path="${REPO_PARENT}/scratch-vm"
        
        echo "Installing scratch-vm dependencies with aggressive optimizations..."
        cd "$repo_path"
        
        # Set aggressive optimization environment variables
        export NODE_OPTIONS="--max-old-space-size=12288"
        export npm_config_progress=false
        export npm_config_silent=false
        export npm_config_foreground_scripts=true
        
        # Use ultra-fast npm ci with all optimizations
        npm ci --no-audit --no-fund --prefer-offline --no-audit --no-fund --cache /tmp/npm-cache
        echo "scratch-vm dependencies installed successfully"
        
        echo "Building scratch-vm with aggressive optimizations..."
        # Use maximum production build optimizations
        export NODE_ENV=production
        export CI=true
        export npm_config_unsafe_perm=true
        
        # Try to use pre-built dist if available, otherwise build
        if [ -d "dist" ] && [ "$(ls -A dist)" ]; then
          echo "Found existing scratch-vm dist, skipping build..."
        else
          echo "Building scratch-vm from scratch (this will take time)..."
          # Build with maximum memory and all optimizations
          npm run build -- --max-old-space-size=12288 --optimize-for-size
          echo "scratch-vm built successfully"
        fi
        
        echo "Creating npm link for scratch-vm..."
        npm link
        echo "scratch-vm linked successfully"
      shell: bash
    
    # Install and build other scratch dependencies with conditional logic
    - name: Install and build other scratch dependencies
      timeout-minutes: 25
      run: |
        REPO_PARENT="${{ env.WORKSPACE_PARENT }}"
        
        # Set optimized environment variables
        export NODE_OPTIONS="--max-old-space-size=8192"
        export npm_config_progress=false
        export NODE_ENV=production
        export npm_config_foreground_scripts=true
        
        # Function to install and build dependencies with conditional logic
        install_and_build_deps() {
          local repo_name=$1
          local repo_path="${REPO_PARENT}/${repo_name}"
          
          if [ -d "$repo_path" ] && [ -f "$repo_path/package.json" ]; then
            echo "Installing ${repo_name} dependencies with optimizations..."
            cd "$repo_path"
            npm ci --no-audit --no-fund --prefer-offline --cache /tmp/npm-cache
            echo "${repo_name} dependencies installed successfully"
            
            # Check if already built to save time
            local should_build=false
            
            if [ "$repo_name" = "scratch-audio" ]; then
              if [ ! -d "dist" ] || [ -z "$(ls -A dist 2>/dev/null)" ]; then
                echo "Building ${repo_name}..."
                npm run build
                should_build=true
              else
                echo "${repo_name} already built, skipping..."
              fi
            elif [ "$repo_name" = "scratch-blocks" ]; then
              if [ ! -d "dist" ] || [ -z "$(ls -A dist 2>/dev/null)" ]; then
                echo "Building ${repo_name}..."
                npm run prepublish
                should_build=true
              else
                echo "${repo_name} already built, skipping..."
              fi
            elif [ "$repo_name" = "scratch-paint" ]; then
              if [ ! -d "build" ] || [ -z "$(ls -A build 2>/dev/null)" ]; then
                echo "Building ${repo_name}..."
                npm run build
                should_build=true
              else
                echo "${repo_name} already built, skipping..."
              fi
            elif [ "$repo_name" = "scratch-render" ]; then
              if [ ! -d "dist" ] || [ -z "$(ls -A dist 2>/dev/null)" ]; then
                echo "Building ${repo_name}..."
                npm run build
                should_build=true
              else
                echo "${repo_name} already built, skipping..."
              fi
            fi
            
            # Create npm link
            echo "Creating npm link for ${repo_name}..."
            npm link
            echo "${repo_name} built and linked successfully"
          fi
        }
        
        # Install and build dependencies with staggered parallel execution
        echo "Building scratch dependencies with staggered execution..."
        
        # Start with the fastest builds first
        install_and_build_deps "scratch-audio" &
        sleep 5  # Small delay to stagger starts
        
        install_and_build_deps "scratch-render" &
        sleep 5
        
        install_and_build_deps "scratch-paint" &
        sleep 5
        
        install_and_build_deps "scratch-blocks" &
        
        # Wait for all installations and builds to complete
        wait
        
        echo "All other scratch dependencies installed and built"
      shell: bash
    
    # Link scratch modules to scratch-gui
    - name: Link scratch modules to scratch-gui
      run: |
        cd "${{ env.WORKSPACE_PARENT }}/scratch-gui"
        echo "Linking scratch modules to scratch-gui..."
        npm link scratch-audio scratch-blocks scratch-paint scratch-render scratch-vm
        echo "All scratch modules linked successfully"
      shell: bash
    
    # Install Desktop dependencies
    - name: Install Desktop dependencies
      run: |
        echo "Installing Desktop dependencies..."
        npm ci --no-audit --no-fund
        
        echo "Preparing extensions..."
        if [ "${{ runner.os }}" = "Windows" ]; then
          echo "Using optimized extension preparation for Windows..."
          npm run prepare-extensions-optimized
        else
          npm run prepare-extensions
        fi
        
        echo "Desktop dependencies installed successfully"
      shell: bash
    
    # Create required directories
    - name: Create build directories
      run: |
        mkdir -p dist-library-files dist-extensions dist-renderer-webpack
      shell: bash
    
    # Fetch library files
    - name: Fetch library files
      run: |
        echo "Fetching library files..."
        npm run fetch
        echo "Library files fetched successfully"
      shell: bash
    
    # Compile with maximum memory and aggressive optimizations
    - name: Compile
      timeout-minutes: 35
      run: |
        echo "Starting webpack compilation with aggressive optimizations..."
        
        # Create temp directories for caching
        mkdir -p /tmp/webpack-cache /tmp/npm-cache
        
        if [ "${{ runner.os }}" = "Windows" ]; then
          export NODE_OPTIONS="--max-old-space-size=12288"
          echo "Using Windows optimizations with 12GB memory..."
        else
          export NODE_OPTIONS="--max-old-space-size=10240"
          echo "Using Unix optimizations with 10GB memory..."
        fi
        
        # Maximum optimizations
        export NODE_ENV=production
        export OPTIMIZE_FOR_SIZE=true
        export npm_config_progress=false
        export npm_config_foreground_scripts=true
        
        # Webpack aggressive optimizations
        export WEBPACK_PARALLELISM=1
        export WEBPACK_CACHE=true
        export WEBPACK_CACHE_COMPRESSION=true
        
        # Additional performance settings
        export UV_THREADPOOL_SIZE=8
        export NODE_ICU_DATA=/node_modules/full-icu
        
        echo "Memory limit set to: $NODE_OPTIONS"
        echo "Starting webpack compilation with maximum optimizations..."
        
        # Clear any existing cache to ensure clean build
        if [ -d "node_modules/.cache" ]; then
          rm -rf node_modules/.cache
        fi
        
        # Run webpack with all optimizations
        npm run webpack:compile
        
        echo "Webpack compilation completed successfully"
      shell: bash
    
    # Package for the specific platform with optimizations
    - name: Package
      timeout-minutes: 20
      run: |
        echo "Packaging for ${{ matrix.platform }} with optimizations..."
        
        # Optimize memory for packaging
        if [ "${{ runner.os }}" = "Windows" ]; then
          export NODE_OPTIONS="--max-old-space-size=8192"
          npm run electron:package -- --win --publish never
        elif [ "${{ runner.os }}" = "macOS" ]; then
          export NODE_OPTIONS="--max-old-space-size=6144"
          npm run electron:package -- --mac --publish never
        else
          export NODE_OPTIONS="--max-old-space-size=6144"
          npm run electron:package -- --linux --publish never
        fi
        
        echo "Packaging completed successfully"
      shell: bash
    
    # Upload artifacts
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ${{ matrix.artifact-name }}
        path: |
          dist/
        retention-days: 7