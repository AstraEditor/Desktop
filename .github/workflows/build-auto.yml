name: Build (Auto)

on:
  push:
  pull_request:

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        persist-credentials: false
        
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: 'npm'
    
    - name: Generate cache key
      id: cache-key
      run: echo "key=deps-${{ hashFiles('package-lock.json') }}" >> $GITHUB_OUTPUT
    
    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: |
          node_modules
          ../scratch-gui/node_modules
          ../scratch-vm/node_modules
          ../scratch-audio/node_modules
          ../scratch-blocks/node_modules
          ../scratch-paint/node_modules
          ../scratch-render/node_modules
        key: ${{ steps.cache-key.outputs.key }}

  build-linux:
    needs: prepare
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        persist-credentials: false
        
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: 'npm'
    
    - name: Restore dependencies cache
      uses: actions/cache@v3
      with:
        path: |
          node_modules
          ../scratch-gui/node_modules
          ../scratch-vm/node_modules
          ../scratch-audio/node_modules
          ../scratch-blocks/node_modules
          ../scratch-paint/node_modules
          ../scratch-render/node_modules
        key: ${{ needs.prepare.outputs.cache-key }}
    
    - name: Setup dependencies
      run: |
        # Clone scratch repositories if not cached
        if [ ! -d "../scratch-gui" ]; then
          cd ..
          git clone --depth 1 https://github.com/AstraEditor/scratch-gui.git
          git clone --depth 1 https://github.com/AstraEditor/scratch-vm.git
          git clone --depth 1 https://github.com/AstraEditor/scratch-audio.git
          git clone --depth 1 https://github.com/AstraEditor/scratch-blocks.git
          git clone --depth 1 https://github.com/AstraEditor/scratch-paint.git
          git clone --depth 1 https://github.com/AstraEditor/scratch-render.git
          cd Desktop
        fi
        
        # Install dependencies only if not cached
        if [ ! -d "node_modules" ]; then
          npm ci --no-audit --no-fund
          npm run prepare-extensions || true
        fi
        
        if [ ! -d "../scratch-gui/node_modules" ]; then
          cd ../scratch-gui && npm ci --no-audit --no-fund && cd ..
        fi
        
        if [ ! -d "../scratch-vm/node_modules" ]; then
          cd ../scratch-vm && npm ci --no-audit --no-fund && cd ..
        fi
        
        if [ ! -d "../scratch-audio/node_modules" ]; then
          cd ../scratch-audio && npm ci --no-audit --no-fund && cd ..
        fi
        
        if [ ! -d "../scratch-blocks/node_modules" ]; then
          cd ../scratch-blocks && npm ci --no-audit --no-fund && cd ..
        fi
        
        if [ ! -d "../scratch-paint/node_modules" ]; then
          cd ../scratch-paint && npm ci --no-audit --no-fund && cd ..
        fi
        
        if [ ! -d "../scratch-render/node_modules" ]; then
          cd ../scratch-render && npm ci --no-audit --no-fund && cd ..
        fi
    
    - name: Create required directories
      run: mkdir -p dist-library-files dist-extensions dist-renderer-webpack
    
    - name: Compile
      run: |
        echo "Starting webpack compilation..."
        export NODE_OPTIONS="--max-old-space-size=4096"
        npm run webpack:compile
    
    - name: Package
      run: npm run electron:package -- --linux
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-output-linux
        path: |
          dist/
        retention-days: 7

  build-windows:
    needs: prepare
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        persist-credentials: false
        
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: 'npm'
    
    - name: Restore dependencies cache
      uses: actions/cache@v3
      with:
        path: |
          node_modules
          ../scratch-gui/node_modules
          ../scratch-vm/node_modules
          ../scratch-audio/node_modules
          ../scratch-blocks/node_modules
          ../scratch-paint/node_modules
          ../scratch-render/node_modules
        key: ${{ needs.prepare.outputs.cache-key }}
    
    - name: Setup dependencies
      shell: powershell
      run: |
        # Clone scratch repositories if not cached
        if (-not (Test-Path "..\scratch-gui")) {
          Set-Location ..
          git clone --depth 1 https://github.com/AstraEditor/scratch-gui.git
          git clone --depth 1 https://github.com/AstraEditor/scratch-vm.git
          git clone --depth 1 https://github.com/AstraEditor/scratch-audio.git
          git clone --depth 1 https://github.com/AstraEditor/scratch-blocks.git
          git clone --depth 1 https://github.com/AstraEditor/scratch-paint.git
          git clone --depth 1 https://github.com/AstraEditor/scratch-render.git
          Set-Location Desktop
        }
        
        # Install dependencies only if not cached
        if (-not (Test-Path "node_modules")) {
          npm ci --no-audit --no-fund
          npm run prepare-extensions
        }
        
        if (-not (Test-Path "..\scratch-gui\node_modules")) {
          Set-Location ..\scratch-gui; npm ci --no-audit --no-fund; Set-Location ..\Desktop
        }
        
        if (-not (Test-Path "..\scratch-vm\node_modules")) {
          Set-Location ..\scratch-vm; npm ci --no-audit --no-fund; Set-Location ..\Desktop
        }
        
        if (-not (Test-Path "..\scratch-audio\node_modules")) {
          Set-Location ..\scratch-audio; npm ci --no-audit --no-fund; Set-Location ..\Desktop
        }
        
        if (-not (Test-Path "..\scratch-blocks\node_modules")) {
          Set-Location ..\scratch-blocks; npm ci --no-audit --no-fund; Set-Location ..\Desktop
        }
        
        if (-not (Test-Path "..\scratch-paint\node_modules")) {
          Set-Location ..\scratch-paint; npm ci --no-audit --no-fund; Set-Location ..\Desktop
        }
        
        if (-not (Test-Path "..\scratch-render\node_modules")) {
          Set-Location ..\scratch-render; npm ci --no-audit --no-fund; Set-Location ..\Desktop
        }
    
    - name: Create required directories
      shell: powershell
      run: mkdir -p dist-library-files dist-extensions dist-renderer-webpack
    
    - name: Compile
      shell: powershell
      run: |
        echo "Starting webpack compilation..."
        $env:NODE_OPTIONS="--max-old-space-size=4096"
        npm run webpack:compile
    
    - name: Package
      shell: powershell
      run: npm run electron:package -- --win
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-output-windows
        path: |
          dist/
        retention-days: 7

  build-mac:
    needs: prepare
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        persist-credentials: false
        
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: 'npm'
    
    - name: Restore dependencies cache
      uses: actions/cache@v3
      with:
        path: |
          node_modules
          ../scratch-gui/node_modules
          ../scratch-vm/node_modules
          ../scratch-audio/node_modules
          ../scratch-blocks/node_modules
          ../scratch-paint/node_modules
          ../scratch-render/node_modules
        key: ${{ needs.prepare.outputs.cache-key }}
    
    - name: Setup dependencies
      run: |
        # Clone scratch repositories if not cached
        if [ ! -d "../scratch-gui" ]; then
          cd ..
          git clone --depth 1 https://github.com/AstraEditor/scratch-gui.git
          git clone --depth 1 https://github.com/AstraEditor/scratch-vm.git
          git clone --depth 1 https://github.com/AstraEditor/scratch-audio.git
          git clone --depth 1 https://github.com/AstraEditor/scratch-blocks.git
          git clone --depth 1 https://github.com/AstraEditor/scratch-paint.git
          git clone --depth 1 https://github.com/AstraEditor/scratch-render.git
          cd Desktop
        fi
        
        # Install dependencies only if not cached
        if [ ! -d "node_modules" ]; then
          npm ci --no-audit --no-fund
          npm run prepare-extensions || true
        fi
        
        if [ ! -d "../scratch-gui/node_modules" ]; then
          cd ../scratch-gui && npm ci --no-audit --no-fund && cd ..
        fi
        
        if [ ! -d "../scratch-vm/node_modules" ]; then
          cd ../scratch-vm && npm ci --no-audit --no-fund && cd ..
        fi
        
        if [ ! -d "../scratch-audio/node_modules" ]; then
          cd ../scratch-audio && npm ci --no-audit --no-fund && cd ..
        fi
        
        if [ ! -d "../scratch-blocks/node_modules" ]; then
          cd ../scratch-blocks && npm ci --no-audit --no-fund && cd ..
        fi
        
        if [ ! -d "../scratch-paint/node_modules" ]; then
          cd ../scratch-paint && npm ci --no-audit --no-fund && cd ..
        fi
        
        if [ ! -d "../scratch-render/node_modules" ]; then
          cd ../scratch-render && npm ci --no-audit --no-fund && cd ..
        fi
    
    - name: Create required directories
      run: mkdir -p dist-library-files dist-extensions dist-renderer-webpack
    
    - name: Compile
      run: |
        echo "Starting webpack compilation..."
        export NODE_OPTIONS="--max-old-space-size=4096"
        npm run webpack:compile
    
    - name: Package
      run: npm run electron:package -- --mac
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-output-mac
        path: |
          dist/
        retention-days: 7