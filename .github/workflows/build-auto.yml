        echo "scratch-vm processed successfully"
      shell: bash
    
    - name: Install and build other scratch dependencies
      run: |
        REPO_PARENT="$(dirname $GITHUB_WORKSPACE)"
        
        # Function to install and build dependencies
        install_and_build_deps() {
          local repo_name=$1
          local repo_path="${REPO_PARENT}/${repo_name}"
          
          if [ -d "$repo_path" ] && [ -f "$repo_path/package.json" ]; then
            echo "Installing ${repo_name} dependencies..."
            cd "$repo_path"
            npm ci --no-audit --no-fund
            echo "${repo_name} dependencies installed successfully"
            
            # Build the module if it has a build script
            if [ "$repo_name" = "scratch-audio" ]; then
              echo "Building ${repo_name}..."
              npm run build
            elif [ "$repo_name" = "scratch-blocks" ]; then
              echo "Building ${repo_name}..."
              npm run prepublish
            elif [ "$repo_name" = "scratch-paint" ]; then
              echo "Building ${repo_name}..."
              npm run build
            elif [ "$repo_name" = "scratch-render" ]; then
              echo "Building ${repo_name}..."
              npm run build
            fi
            
            # Create npm link
            echo "Creating npm link for ${repo_name}..."
            npm link
            echo "${repo_name} processed successfully"
          fi
        }
        
        # Install and build dependencies
        for repo in "scratch-audio" "scratch-blocks" "scratch-paint" "scratch-render"; do
          install_and_build_deps "$repo"
        done
        
        echo "All other scratch dependencies processed"
      shell: bash
    
    - name: Link scratch modules to scratch-gui
      run: |
        cd "$(dirname $GITHUB_WORKSPACE)/scratch-gui"
        echo "Linking scratch modules to scratch-gui..."
        npm link scratch-audio scratch-blocks scratch-paint scratch-render scratch-vm
        echo "All scratch modules linked successfully"
      shell: bash
    
    - name: Install Desktop dependencies
      run: |
        echo "Installing Desktop dependencies..."
        npm ci --no-audit --no-fund
        echo "Desktop dependencies installed successfully"
      shell: bash
    
    - name: Prepare extensions
      run: |
        echo "Preparing extensions..."
        npm run prepare-extensions
        echo "Extensions prepared successfully"
      shell: bash
    
    - name: Fetch library files
      run: |
        echo "Fetching library files..."
        npm run fetch
        echo "Library files fetched successfully"
      shell: bash
    
    - name: Compile
      run: |
        echo "Starting webpack compilation..."
        npm run webpack:prod
        echo "Webpack compilation completed successfully"
      shell: bash
    
    - name: Package
      run: |
        echo "Packaging for macOS..."
        # Skip code signing to avoid codesign errors in CI
        export CSC_IDENTITY=
        export CSC_NAME=
        
        # Need to run the universal builds as separate commands or it breaks when @electron/universal
        # diffs the ASARs and finds spurious differences. Not clear why.
        echo "Building macOS universal..."
        node release-automation/build.mjs --mac --universal --production || echo "Universal build may have warnings"
        
        echo "Building macOS legacy 11..."
        node release-automation/build.mjs --mac-legacy-11 --universal --production || echo "Legacy 11 build may have warnings"
        
        echo "Building macOS legacy 10.13-10.15..."
        node release-automation/build.mjs --mac-legacy-10.13-10.14 --mac-legacy-10.15 --x64 || echo "Legacy build may have warnings"
        
        echo "macOS packaging completed successfully"
      shell: bash
    
