      run: node scripts/print-file-tree.mjs dist
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: mac
        path: dist/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        persist-credentials: false
        path: repo
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24
    
    - name: "Move repository to D: drive"
      run: |
        Copy-Item -Path repo -Destination D:\repo -Recurse
        Remove-Item -Path repo -Recurse -Force
    
    - name: "Configure npm to use D: drive"
      run: |
        npm config set cache D:\npm-cache
        npm config set prefix D:\npm-prefix
    
    - name: Clone scratch repositories
      run: |
        REPO_PARENT="D:\"
        
        # Function to clone repository
        function Clone-Repo($repoName) {
          $repoUrl = "https://github.com/AstraEditor/${repoName}.git"
          $repoPath = "${REPO_PARENT}${repoName}"
          
          Write-Host "Cloning ${repoName}..."
          git clone --depth 1 --single-branch $repoUrl $repoPath
        }
        
        # Clone all required repositories
        Clone-Repo "scratch-gui"
        Clone-Repo "scratch-vm"
        Clone-Repo "scratch-audio"
        Clone-Repo "scratch-blocks"
        Clone-Repo "scratch-paint"
        Clone-Repo "scratch-render"
        
        Write-Host "All repositories cloned successfully"
      shell: powershell
    
    - name: Validate package.json files
      run: |
        REPO_PARENT="D:\"
        
        # Validate Desktop package.json
        node D:\repo\scripts\validate-package.js D:\repo\package.json
        
        # Validate scratch repositories
        $repos = @("scratch-gui", "scratch-vm", "scratch-audio", "scratch-blocks", "scratch-paint", "scratch-render")
        foreach ($repo in $repos) {
          $packagePath = "${REPO_PARENT}${repo}\package.json"
          if (Test-Path $packagePath) {
            node D:\repo\scripts\validate-package.js $packagePath
          } else {
            Write-Host "Warning: ${repo}/package.json not found"
          }
        }
        
        Write-Host "All package.json files validated successfully"
      shell: powershell
    
    - name: Install scratch-gui dependencies
      run: |
        cd D:\scratch-gui
        Write-Host "Installing scratch-gui dependencies..."
        npm ci --no-audit --no-fund
        Write-Host "scratch-gui dependencies installed successfully"
      shell: powershell
    
    - name: Install and build scratch-vm
      run: |
        cd D:\scratch-vm
        
        Write-Host "Installing scratch-vm dependencies..."
        npm ci --no-audit --no-fund
        
        Write-Host "Building scratch-vm..."
        npm run build
        
        Write-Host "Creating npm link for scratch-vm..."
        npm link
        Write-Host "scratch-vm processed successfully"
      shell: powershell
    
    - name: Install and build other scratch dependencies
      run: |
        # Function to install and build dependencies
        function Install-Build-Dep($repoName) {
          $repoPath = "D:\${repoName}"
          
          if (Test-Path $repoPath) {
            $packagePath = "${repoPath}\package.json"
            if (Test-Path $packagePath) {
              Write-Host "Installing ${repoName} dependencies..."
              cd $repoPath
              npm ci --no-audit --no-fund
              Write-Host "${repoName} dependencies installed successfully"
              
              # Build the module if it has a build script
              if ($repoName -eq "scratch-audio") {
                Write-Host "Building ${repoName}..."
                npm run build
              } elseif ($repoName -eq "scratch-blocks") {
                Write-Host "Building ${repoName}..."
                npm run prepublish
              } elseif ($repoName -eq "scratch-paint") {
                Write-Host "Building ${repoName}..."
                npm run build
              } elseif ($repoName -eq "scratch-render") {
                Write-Host "Building ${repoName}..."
                npm run build
              }
              
              # Create npm link
              Write-Host "Creating npm link for ${repoName}..."
              npm link
              Write-Host "${repoName} processed successfully"
            }
          }
        }
        
        # Install and build dependencies
        $repos = @("scratch-audio", "scratch-blocks", "scratch-paint", "scratch-render")
        foreach ($repo in $repos) {
          Install-Build-Dep $repo
        }
        
        Write-Host "All other scratch dependencies processed"
      shell: powershell
    
    - name: Link scratch modules to scratch-gui
      run: |
        cd D:\scratch-gui
        Write-Host "Linking scratch modules to scratch-gui..."
        npm link scratch-audio scratch-blocks scratch-paint scratch-render scratch-vm
        Write-Host "All scratch modules linked successfully"
      shell: powershell
    
    - name: Install Desktop dependencies
      run: |
        cd D:\repo
        Write-Host "Installing Desktop dependencies..."
        npm ci --no-audit --no-fund --cache D:\npm-cache
        Write-Host "Desktop dependencies installed successfully"
      shell: powershell
    
    - name: Prepare extensions
      run: |
        cd D:\repo
        Write-Host "Preparing extensions..."
        npm run prepare-extensions-optimized
        Write-Host "Extensions prepared successfully"
      shell: powershell
    
    - name: Fetch library files
      run: |
        cd D:\repo
        Write-Host "Fetching library files..."
        npm run fetch
        Write-Host "Library files fetched successfully"
      shell: powershell
    
    - name: Compile
      run: |
        cd D:\repo
        Write-Host "Starting webpack compilation..."
        npm run webpack:prod
        Write-Host "Webpack compilation completed successfully"
      shell: powershell
    
    - name: Package
      run: |
        cd D:\repo
        Write-Host "Packaging for Windows..."
        
        # Skip code signing for Microsoft Store builds in CI
        $env:CSC_IDENTITY=""
        $env:CSC_NAME=""
        
        try {
          Write-Host "Building Windows Microsoft Store versions..."
          node release-automation/build.mjs --windows --microsoft-store --x64 --ia32 --arm64
        } catch {
          Write-Host "Microsoft Store build may have warnings, continuing..."
        }
        
        try {
          Write-Host "Building Windows portable version..."
          node release-automation/build.mjs --windows-portable --x64
        } catch {
          Write-Host "Portable build may have warnings, continuing..."
        }
        
        try {
          Write-Host "Building Windows legacy versions..."
          node release-automation/build.mjs --windows-legacy --ia32 --x64
        } catch {
          Write-Host "Legacy build may have warnings, continuing..."
        }
        
        Write-Host "Windows packaging completed successfully"
      shell: powershell
    
    - name: Print file tree
      run: |
        cd D:\repo
        node scripts/print-file-tree.mjs dist
      shell: powershell
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows
        path: |
          D:\repo\dist\*.exe
          D:\repo\dist\*.appx