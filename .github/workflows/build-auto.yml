name: Build (Auto)

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        persist-credentials: false
    
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: 'npm'
    
    - name: Install dependencies
      run: |
        # Remove problematic lock file and reinstall
        rm -f package-lock.json
        
        # Clone scratch-gui to parent directory structure
        cd ..
        git clone https://github.com/AstraEditor/scratch-gui.git
        echo "Scratch-gui cloned successfully"
        ls -la scratch-gui
        cd Desktop
        
        # Install dependencies
        npm install --no-audit --no-fund
        npm run prepare-extensions || true  # Allow failure during extension prep
    
    - name: Create required directories
      run: |
        mkdir -p dist-library-files dist-extensions dist-renderer-webpack
    
    
        
    - name: Compile
      run: |
        echo "Starting webpack compilation..."
        echo "Increasing Node.js memory limit..."
        export NODE_OPTIONS="--max-old-space-size=4096"
        npm run webpack:compile
        echo "Webpack compilation completed with exit code: $?"
    
    - name: Package
      run: npm run electron:package:dir
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-output
        path: |
          dist/
          dist-renderer-webpack/
        retention-days: 7
