name: Build (Manual)

on:
  workflow_dispatch:

jobs:
  # ==========================================
  # 统一构建步骤 (webpack:prod)
  # ==========================================
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        persist-credentials: false

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24


    - name: Install pnpm
      run: corepack enable && corepack prepare pnpm@10.33.2 --activate

    - name: Install dependencies
      run: |
        rm -f pnpm-lock.yaml
        pnpm install --no-frozen-lockfile --ignore-scripts

    - name: Build scratch-gui (run prepublish)
      run: |
        GUI_PKG=$(pnpm list --parseable --depth=-1 | grep 'scratch-gui@' | head -n1)
        if [ -z "$GUI_PKG" ]; then
            exit 1
        fi
        cd "$GUI_PKG"
        pnpm run prepublish || {
            pnpm run build
        }
    - name: Fetch
      run: pnpm run fetch

    - name: Compile (webpack:prod)
      run: pnpm run webpack:prod

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          dist-astra-extensions/
          dist-extension-editor/
          dist-extensions/
          dist-library-files/
          dist-renderer-webpack/
          src-renderer/packager/
        retention-days: 1

  # ==========================================
  # Linux 标准格式打包 (5格式 × 3架构)
  # ==========================================
  package-linux:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        format: [debian, tarball, appimage, pacman, rpm]
        arch: [x64, armv7l, arm64]
        include:
          - format: pacman
            extra-deps: 'ruby ruby-dev rubygems libarchive-tools'
          - format: rpm
            extra-deps: 'rpm ruby ruby-dev rubygems'
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        persist-credentials: false

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Install pnpm
      run: corepack enable && corepack prepare pnpm@10.33.2 --activate

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y strip-nondeterminism fakeroot ${{ matrix.extra-deps }}

    - name: Install fpm
      if: matrix.format == 'pacman' || matrix.format == 'rpm'
      run: sudo gem install --no-document fpm

    - name: Install dependencies
      run: |
        rm -f pnpm-lock.yaml
        pnpm install --loglevel=info --ignore-scripts

    - name: Package
      run: |
        node release-automation/build.mjs --${{ matrix.format }} --${{ matrix.arch }} --production

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-${{ matrix.format }}-${{ matrix.arch }}
        path: dist/*.*
        retention-days: 1

  # ==========================================
  # FreeBSD 打包
  # ==========================================
  package-freebsd:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Install pnpm
      run: corepack enable && corepack prepare pnpm@10.33.2 --activate

    - name: Install dependencies
      run: |
        rm -f pnpm-lock.yaml
        pnpm install --loglevel=info --ignore-scripts

    - name: Get version
      id: ver
      run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

    - name: Build tarball & extract app.asar
      run: |
        node release-automation/build.mjs --tarball --x64 --production
        mkdir -p _extract
        tar -xzf dist/*.tar.gz -C _extract
        find _extract -name "app.asar" -exec cp {} app.asar \;
        ls -la app.asar

    - name: Assemble pkg contents
      run: |
        mkdir -p staging/usr/local/share/astraeditor
        mkdir -p staging/usr/local/bin
        mkdir -p staging/usr/local/share/applications
        mkdir -p staging/usr/local/share/icons/hicolor/256x256/apps

        cp app.asar staging/usr/local/share/astraeditor/

        cat > staging/usr/local/bin/astraeditor-desktop << 'EOF'
        #!/bin/sh
        exec /usr/local/bin/electron /usr/local/share/astraeditor/app.asar "$@"
        EOF
        chmod +x staging/usr/local/bin/astraeditor-desktop

        cat > staging/usr/local/share/applications/astraeditor-desktop.desktop << 'EOF'
        [Desktop Entry]
        Name=AstraEditor
        Comment=TurboWarp mod with compiler and more features
        Exec=astraeditor-desktop %U
        Terminal=false
        Type=Application
        Icon=astraeditor
        Categories=Development;Education;
        EOF
        for res in 48 64 128 256 512; do
          if [ -f "build/icons/${res}x${res}.png" ]; then
            mkdir -p "staging/usr/local/share/icons/hicolor/${res}x${res}/apps"
            cp "build/icons/${res}x${res}.png" "staging/usr/local/share/icons/hicolor/${res}x${res}/apps/astraeditor.png"
          fi
        done

    - name: Generate +MANIFEST
      run: |
        cd staging
        cat > +MANIFEST << 'MANIFEST'
        {
          "name": "astraeditor",
          "version": "VERSION_PLACEHOLDER",
          "origin": "devel/astraeditor",
          "comment": "AstraEditor - TurboWarp mod",
          "desc": "AstraEditor is a TurboWarp mod used to add more practical features to make your writing lightning fast.",
          "maintainer": "LuoTianyi_arm64 <2153585992@qq.com>",
          "www": "https://github.com/AstraEditor/Desktop",
          "prefix": "/usr/local",
          "deps": {
            "electron": {
              "origin": "devel/electron",
              "version": ">=28.0.0"
            }
          },
          "files": {
        MANIFEST
        find usr -type f | sed 's|^|    "/|g; s|$|": "1"|g' | sed '$!s/$/,/' >> +MANIFEST
        echo "  }" >> +MANIFEST
        echo "}" >> +MANIFEST
        sed -i "s|VERSION_PLACEHOLDER|${{ steps.ver.outputs.version }}|g" +MANIFEST
    - name: Create .pkg
      run: |
        cd staging
        tar --format=posix -cf - +MANIFEST $(find usr -type f | sort) | xz -9 > ../astraeditor-freebsd-x64.pkg

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: freebsd-x64
        path: astraeditor-freebsd-x64.pkg
        retention-days: 1

  # ==========================================
  # Mac 打包
  # ==========================================
  package-mac:
    needs: build
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: modern
            args: '--mac --universal'
          - target: legacy-10.13-10.14
            args: '--mac-legacy-10.13-10.14 --x64'
          - target: legacy-10.15
            args: '--mac-legacy-10.15 --x64'
          - target: legacy-11
            args: '--mac-legacy-11 --universal'
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        persist-credentials: false

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Install pnpm
      run: corepack enable && corepack prepare pnpm@10.33.2 --activate

    - name: Install dependencies
      run: |
        rm -f pnpm-lock.yaml
        pnpm install --loglevel=info --ignore-scripts

    - name: Package
      run: |
        node release-automation/build.mjs ${{ matrix.args }} --production

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: mac-${{ matrix.target }}
        path: dist/*.dmg
        retention-days: 1

  # ==========================================
  # Windows 打包
  # ==========================================
  package-windows:
    needs: build
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: modern-nsis-x64
            args: '--windows --x64'
            files: '*.exe'
          - target: modern-nsis-ia32
            args: '--windows --ia32'
            files: '*.exe'
          - target: modern-nsis-arm64
            args: '--windows --arm64'
            files: '*.exe'
          - target: modern-appx-x64
            args: '--microsoft-store --x64'
            files: '*.appx'
          - target: modern-appx-ia32
            args: '--microsoft-store --ia32'
            files: '*.appx'
          - target: modern-appx-arm64
            args: '--microsoft-store --arm64'
            files: '*.appx'
          - target: portable
            args: '--windows-portable --x64'
            files: '*.exe'
          - target: legacy-x64
            args: '--windows-legacy --x64'
            files: '*.exe'
          - target: legacy-ia32
            args: '--windows-legacy --ia32'
            files: '*.exe'
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        persist-credentials: false
        path: repo

    - name: Move to D drive
      shell: pwsh
      run: |
        Copy-Item -Path repo -Destination D:\repo -Recurse
        Remove-Item -Path repo -Recurse -Force

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts
        path: D:\repo\

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Install pnpm
      run: corepack enable && corepack prepare pnpm@10.33.2 --activate


    - name: Configure pnpm cache
      shell: pwsh
      run: |
        pnpm config set store-dir D:\pnpm-store

    - name: Install dependencies (skip postinstall)
      working-directory: D:\repo
      run: |
        Remove-Item -Path pnpm-lock.yaml -Force -ErrorAction SilentlyContinue
        pnpm install --loglevel=info --ignore-scripts

    - name: Package
      working-directory: D:\repo
      run: |
        node release-automation/build.mjs ${{ matrix.args }} --production

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-${{ matrix.target }}
        path: D:\repo\dist\${{ matrix.files }}
        retention-days: 1
