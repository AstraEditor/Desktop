name: Build (Manual)

on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        persist-credentials: false
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24
    - name: Install Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    - name: Install strip-nondeterminism
      run: sudo apt-get install strip-nondeterminism
    - name: Install dependencies for pacman
      run: |
        sudo apt-get update
        sudo apt-get install -y ruby ruby-dev rubygems build-essential
        sudo apt-get install -y strip-nondeterminism fakeroot libarchive-tools
        sudo gem install --no-document fpm
    - name: Install dependencies
      run: |
        echo "=== Removing package-lock.json to use latest git commits ==="
        rm package-lock.json
        echo "=== Installing dependencies ==="
        npm install --loglevel=info
    - name: Fetch
      run: npm run fetch
    - name: Compile
      run: npm run webpack:prod
    - name: Package
      run: |
        node release-automation/build.mjs --debian --tarball --appimage --pacman --x64 --armv7l --arm64
    - name: Print file tree
      run: node scripts/print-file-tree.mjs dist
    - name: Upload artifacts to GitHub Actions
      uses: actions/upload-artifact@v4
      with:
        name: linux
        path: |
          dist/*.deb
          dist/*.tar.gz
          dist/*.AppImage
          dist/*.pkg.tar.zst
  build-mac:
    runs-on: macos-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        persist-credentials: false
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24
    - name: Install Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    - name: Install dependencies
      run: |
        echo "=== Removing package-lock.json to use latest git commits ==="
        rm package-lock.json
        echo "=== Installing dependencies ==="
        npm install --loglevel=info
    - name: Fetch
      run: npm run fetch
    - name: Compile
      run: npm run webpack:prod
    - name: Package
      run: |
        # Need to run the universal builds as separate commands or it breaks when @electron/universal
        # diffs the ASARs and finds spurious differences. Not clear why.
        node release-automation/build.mjs --mac --universal --production
        node release-automation/build.mjs --mac-legacy-11 --universal --production
        node release-automation/build.mjs --mac-legacy-10.13-10.14 --mac-legacy-10.15 --x64
    - name: Print file tree
      run: node scripts/print-file-tree.mjs dist
    - name: Upload artifacts to GitHub Actions
      uses: actions/upload-artifact@v4
      with:
        name: mac
        path: dist/*.dmg
  push_to_aur:
    runs-on: ubuntu-latest
    environment: astraeditor-bin
    env:
      TAG: ${{ github.ref_name }}
    steps:
    - name: generate PKGBUILD and .SRCINFO
      run: |
        VERSION: ${TAG#v}
        cat > PKGBUILD << EOF
        # Maintainer: LuoTianyi_arm64 <2153585992@qq.com>
        options=(!strip !debug)
        pkgname=astraeditor-bin
        provides=('astraeditor')
        conflicts=('astraeditor')
        pkgver=${VERSION}
        pkgrel=1
        pkgdesc='AstraEditor is a TurboWarp mod used to add more practical features to make your writing lightning fast.'
        arch=('x86_64' 'aarch64' 'armv7h')
        url='https://github.com/AstraEditor/'
        license=('GPL3')
        depends=('alsa-lib' 'gtk3' 'nss' 'libxss' 'xdg-utils' 'hicolor-icon-theme')
        source_x86_64=("astraeditor-\${pkgver}-x86_64.deb::https://github.com/AstraEditor/Desktop/releases/download/${TAG}/AstraEditor-linux-amd64-\${pkgver}.deb")
        source_armv7h=("astraeditor-\${pkgver}-armv7h.deb::https://github.com/AstraEditor/Desktop/releases/download/${TAG}/AstraEditor-linux-armv7l-\${pkgver}.deb")
        source_aarch64=("astraeditor-\${pkgver}-aarch64.deb::https://github.com/AstraEditor/Desktop/releases/download/${TAG}/AstraEditor-linux-aarch64-\${pkgver}.deb")
        sha256sums_x86_64=('SKIP')
        sha256sums_armv7h=('SKIP')
        sha256sums_aarch64=('SKIP')

        build() {
            cd "\$srcdir"

            case "\$CARCH" in
                x86_64)  debfile="astraeditor-\${pkgver}-x86_64.deb" ;;
                aarch64) debfile="astraeditor-\${pkgver}-aarch64.deb" ;;
                armv7h)  debfile="astraeditor-\${pkgver}-armv7h.deb" ;;
            esac
            bsdtar -xf "\$debfile"
            bsdtar -xf data.tar.xz
        }

        package() {
            cp -r "\$srcdir/opt" "\$pkgdir"
            cp -r "\$srcdir/usr" "\$pkgdir"
            if [ ! -L "\$pkgdir/usr/bin/astraeditor-desktop" ]; then
                install -d "\$pkgdir/usr/bin"
                ln -sf '/opt/AstraEditor/astraeditor-desktop' "\$pkgdir/usr/bin/astraeditor-desktop"
            fi
        }
        EOF

        cat > .SRCINFO << EOF
        pkgbase = astraeditor-bin
          pkgdesc = AstraEditor is a TurboWarp mod used to add more practical features to make your writing lightning fast.
          pkgver = ${VERSION}
          pkgrel = 1
          url = https://github.com/AstraEditor/
          arch = x86_64
          arch = armv7h
          arch = aarch64
          license = GPL3
          depends = alsa-lib 
          depends = gtk3
          depends = nss
          depends = libxss
          depends = xdg-utils
          depends = hicolor-icon-theme
          provides = astraeditor-bin
          source_x86_64=("astraeditor-\${pkgver}-x86_64.deb::https://github.com/AstraEditor/Desktop/releases/download/${TAG}/AstraEditor-linux-amd64-\${pkgver}.deb")
          source_armv7h=("astraeditor-\${pkgver}-armv7h.deb::https://github.com/AstraEditor/Desktop/releases/download/${TAG}/AstraEditor-linux-armv7l-\${pkgver}.deb")
          source_aarch64=("astraeditor-\${pkgver}-aarch64.deb::https://github.com/AstraEditor/Desktop/releases/download/${TAG}/AstraEditor-linux-aarch64-\${pkgver}.deb")
          sha256sums_x86_64=('SKIP')
          sha256sums_armv7h=('SKIP')
          sha256sums_aarch64=('SKIP')
          pkgname = astraeditor-bin
        EOF
    - name: Push to AUR
      uses: KSXGitHub/github-actions-deploy-aur@v4.1.1 
      with:
        pkgname: astraeditor-bin
        pkgbuild: ./PKGBUILD
        assets: |
          .SRCINFO
        commit_username: ${{ secrets.AUR_USERNAME }}
        commit_email: ${{ secrets.AUR_EMAIL }}
        ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        commit_message: Update AUR package
        ssh_keyscan_types: ed25519
  build-windows:
    # GitHub's Windows runners have a C: drive and a D: drive.
    # C: is for the OS and has good read performance but awful write performance.
    # D: has much better faster write performance (>20x faster than C:)
    # We want to use the D: drive whenever we can. Trying to do "npm install" on the C:
    # drive has been observed to take over an hour!
    runs-on: windows-latest
    steps:
    # actions/checkout can only clone to paths in $GITHUB_WORKSPACE which is on the C: drive,
    # so we have to clone to C: then copy to D: after. This repository itself isn't huge so
    # this is plenty fast.
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        persist-credentials: false
        path: repo
    - name: "Move repository to D: drive"
      run: |
        Copy-Item -Path repo -Destination D:\repo -Recurse
        Remove-Item -Path repo -Recurse -Force
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24
    - name: Install Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    # The repository being on D: means that node_modules IO will be fast, but npm still downloads
    # packages to a temporary folder for caching which is on C: by default. We need to make sure
    # npm uses the D: drive instead otherwise we still get bottlenecked by C:.
    - name: "Configure npm to use D: drive"
      run: |
        npm config set cache D:\npm-cache
        npm config set prefix D:\npm-prefix
    - name: Install dependencies
      working-directory: D:\repo
      run: |
        echo "=== Removing package-lock.json to use latest git commits ==="
        Remove-Item -Path package-lock.json -Force -ErrorAction SilentlyContinue
        echo "=== Installing dependencies ==="
        npm install --loglevel=info
    - name: Fetch
      working-directory: D:\repo
      run: npm run fetch
    - name: Compile
      working-directory: D:\repo
      run: npm run webpack:prod
    - name: Package
      working-directory: D:\repo
      run: |
        node release-automation/build.mjs --windows --microsoft-store --x64 --ia32 --arm64
        node release-automation/build.mjs --windows-portable --x64
        node release-automation/build.mjs --windows-legacy --ia32 --x64
    - name: Print file tree
      working-directory: D:\repo
      run: node scripts/print-file-tree.mjs dist
    - name: Upload artifacts to GitHub Actions
      uses: actions/upload-artifact@v4
      with:
        name: windows
        path: |
          D:\repo\dist\*.exe
          D:\repo\dist\*.appx