name: Build (Manual)

on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        persist-credentials: false
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'yarn'  # 启用 yarn 缓存
    - name: Install Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    - name: Install strip-nondeterminism
      run: sudo apt-get install strip-nondeterminism
    - name: Install fpm and bsdtar for pacman
      run: |
        sudo apt-get update
        sudo apt-get install -y ruby ruby-dev rubygems build-essential libarchive-tools
        sudo gem install --no-document fpm
    - name: Verify tools
      run: |
        which fpm && fpm --version
        which bsdtar && bsdtar --version
    - name: Install dependencies
      run: |
        npm install -g yarn
        yarn install --frozen-lockfile
    - name: Fetch
      run: yarn fetch
    - name: Compile
      run: yarn webpack:prod
    - name: Package
      run: |
        # 先构建 deb、appimage、tarball
        node release-automation/build.mjs --debian --tarball --appimage --x64 --armv7l --arm64 || true
        # 单独构建 pacman（使用 electron-builder）
        npx electron-builder --linux pacman --x64
        npx electron-builder --linux pacman --armv7l
        npx electron-builder --linux pacman --arm64
    - name: Debug dist contents
      run: |
        echo "=== All files in dist/ ==="
        ls -la dist/ || echo "dist directory not found"
        echo "=== Check for pacman files ==="
        find dist/ -name "*.pacman" -o -name "*.pkg.tar.zst" -o -name "*pacman*" || echo "No pacman files found"
    - name: Upload artifacts to GitHub Actions
      uses: actions/upload-artifact@v4
      with:
        name: linux
        path: |
          dist/*.deb
          dist/*.tar.gz
          dist/*.AppImage
          dist/*.pacman
          dist/*.pkg.tar.zst

  build-mac:
    runs-on: macos-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        persist-credentials: false
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'yarn'
    - name: Install Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    - name: Install dependencies
      run: |
        npm install -g yarn
        yarn install --frozen-lockfile
    - name: Fetch
      run: yarn fetch
    - name: Compile
      run: yarn webpack:prod
    - name: Package
      run: |
        node release-automation/build.mjs --mac --universal --production
        node release-automation/build.mjs --mac-legacy-11 --universal --production
        node release-automation/build.mjs --mac-legacy-10.13-10.14 --mac-legacy-10.15 --x64
    - name: Print file tree
      run: node scripts/print-file-tree.mjs dist
    - name: Upload artifacts to GitHub Actions
      uses: actions/upload-artifact@v4
      with:
        name: mac
        path: dist/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        persist-credentials: false
        path: repo
    - name: "Move repository to D: drive"
      run: |
        Copy-Item -Path repo -Destination D:\repo -Recurse
        Remove-Item -Path repo -Recurse -Force
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'yarn'
    - name: Install Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    - name: "Configure npm to use D: drive"
      run: |
        npm config set cache D:\npm-cache
        npm config set prefix D:\npm-prefix
    - name: Install dependencies
      working-directory: D:\repo
      run: |
        npm install -g yarn
        yarn install --frozen-lockfile
    - name: Fetch
      working-directory: D:\repo
      run: yarn fetch
    - name: Compile
      working-directory: D:\repo
      run: yarn webpack:prod
    - name: Package
      working-directory: D:\repo
      run: |
        node release-automation/build.mjs --windows --microsoft-store --x64 --ia32 --arm64
        node release-automation/build.mjs --windows-portable --x64
        node release-automation/build.mjs --windows-legacy --ia32 --x64
    - name: Print file tree
      working-directory: D:\repo
      run: node scripts/print-file-tree.mjs dist
    - name: Upload artifacts to GitHub Actions
      uses: actions/upload-artifact@v4
      with:
        name: windows
        path: |
          D:\repo\dist\*.exe
          D:\repo\dist\*.appx
