name: Release

on:
  push:
    tags:
    - 'v*'

permissions:
  contents: write

jobs:
  release-linux:
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1  # 添加：避免 playwright 下载超时
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        persist-credentials: false
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y strip-nondeterminism fakeroot libarchive-tools
        
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Install Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
        
    - name: Install dependencies for pacman
      run: |
        sudo apt-get install -y ruby ruby-dev rubygems build-essential
        sudo gem install --no-document fpm
        
    - name: Install dependencies
      run: |
        echo "=== Removing package-lock.json to use latest git commits ==="
        rm -f package-lock.json
        echo "=== Installing dependencies ==="
        npm install --loglevel=info
        
    - name: Verify scratch dependencies
      run: |
        test -f node_modules/scratch-blocks/blockly_compressed_vertical.js
        test -f node_modules/scratch-blocks/blocks_compressed_vertical.js
        node -e "const fs=require('fs'); const paths=['node_modules/@turbowarp/scratch-l10n/locales/editor-msgs.js','node_modules/scratch-gui/node_modules/@turbowarp/scratch-l10n/locales/editor-msgs.js']; if(!paths.some(p=>fs.existsSync(p))){ console.error('Missing editor-msgs.js from @turbowarp/scratch-l10n'); process.exit(1);} "
        
    - name: Fetch
      run: npm run fetch
      
    - name: Compile
      run: npm run webpack:prod
      
    - name: Package
      run: |
        node release-automation/build.mjs --debian --tarball --appimage --pacman --x64 --armv7l --arm64 --production

    - name: Verify Linux artifacts
      run: |
        ls -lh dist/*.deb
        ls -lh dist/*.tar.gz
        ls -lh dist/*.AppImage
        ls -lh dist/*.pkg.tar.zst
        
    - name: Print file tree
      run: node scripts/print-file-tree.mjs dist
      
    - name: Upload artifacts to GitHub Actions
      uses: actions/upload-artifact@v4
      with:
        name: linux
        path: |
          dist/*.deb
          dist/*.tar.gz
          dist/*.AppImage
          dist/*.pkg.tar.zst  # 确保包含 pacman 包
          
    - name: Upload artifacts to tag
      run: |
        node scripts/upload-to-github-releases.mjs "${{ github.repository_owner }}" "${{ github.event.repository.name }}" "dist/*.deb"
        node scripts/upload-to-github-releases.mjs "${{ github.repository_owner }}" "${{ github.event.repository.name }}" "dist/*.tar.gz"
        node scripts/upload-to-github-releases.mjs "${{ github.repository_owner }}" "${{ github.event.repository.name }}" "dist/*.AppImage"
        node scripts/upload-to-github-releases.mjs "${{ github.repository_owner }}" "${{ github.event.repository.name }}" "dist/*.pkg.tar.zst"  # 添加：上传 pacman 包
      env:
        GH_TOKEN: "${{ github.token }}"

  release-mac:
    runs-on: macos-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        persist-credentials: false
        
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Install Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
        
    - name: Install dependencies
      run: |
        echo "=== Removing package-lock.json to use latest git commits ==="
        rm -f package-lock.json
        echo "=== Installing dependencies ==="
        npm install --loglevel=info
        
    - name: Verify scratch dependencies
      run: |
        test -f node_modules/scratch-blocks/blockly_compressed_vertical.js
        test -f node_modules/scratch-blocks/blocks_compressed_vertical.js
        node -e "const fs=require('fs'); const paths=['node_modules/@turbowarp/scratch-l10n/locales/editor-msgs.js','node_modules/scratch-gui/node_modules/@turbowarp/scratch-l10n/locales/editor-msgs.js']; if(!paths.some(p=>fs.existsSync(p))){ console.error('Missing editor-msgs.js from @turbowarp/scratch-l10n'); process.exit(1);} "
        
    - name: Fetch
      run: npm run fetch
      
    - name: Compile
      run: npm run webpack:prod
      
    - name: Package
      run: |
        cleanup() {
          if [ -n "${APPLE_API_KEY_NAME:-}" ]; then
            rm -f "$APPLE_API_KEY_NAME"
          fi
        }
        trap cleanup EXIT

        signing_ok=true
        if [ -z "${CSC_LINK:-}" ] || [ -z "${CSC_KEY_PASSWORD:-}" ]; then
          signing_ok=false
        fi

        if [ "$signing_ok" = true ] && ([[ "${CSC_LINK:-}" == /* ]] || [[ "${CSC_LINK:-}" == ./* ]] || [[ "${CSC_LINK:-}" == ../* ]]); then
          if [ ! -f "$CSC_LINK" ]; then
            echo "CSC_LINK looks like a path but is not a file; building unsigned."
            signing_ok=false
          fi
        fi

        if [ "$signing_ok" != true ]; then
          export CSC_IDENTITY_AUTO_DISCOVERY=false
          unset CSC_LINK
          unset CSC_KEY_PASSWORD
        fi

        if [ -n "${APPLE_API_KEY_NAME:-}" ] && [ -n "${APPLE_API_KEY_DATA:-}" ]; then
          python3 -c "import os; open(os.getenv('APPLE_API_KEY_NAME'), 'w').write(os.getenv('APPLE_API_KEY_DATA'))" >/dev/null 2>&1 || { echo "Failed to write APPLE_API_KEY file"; exit 1; }
          export APPLE_API_KEY="$(pwd)/$APPLE_API_KEY_NAME"
        else
          echo "APPLE_API_KEY_NAME / APPLE_API_KEY_DATA not set; skipping notarization."
        fi

        node release-automation/build.mjs --mac --universal --production
        node release-automation/build.mjs --mac-legacy-11 --universal --production
        node release-automation/build.mjs --mac-legacy-10.13-10.14 --mac-legacy-10.15 --x64 --production
      env:
        APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        APPLE_API_KEY_NAME: ${{ secrets.APPLE_API_KEY_NAME }}
        APPLE_API_KEY_DATA: ${{ secrets.APPLE_API_KEY_DATA }}
        CSC_LINK: ${{ secrets.APPLE_CSC_LINK }}
        CSC_KEY_PASSWORD: ${{ secrets.APPLE_CSC_KEY_PASSWORD }}

    - name: Verify macOS artifacts
      run: |
        ls -lh dist/*.dmg
        
    - name: Print file tree
      run: node scripts/print-file-tree.mjs dist
      
    - name: Upload artifacts to GitHub Actions
      uses: actions/upload-artifact@v4
      with:
        name: mac
        path: dist/*.dmg
        
    - name: Upload artifacts to tag
      run: |
        node scripts/upload-to-github-releases.mjs "${{ github.repository_owner }}" "${{ github.event.repository.name }}" "dist/*.dmg"
      env:
        GH_TOKEN: "${{ github.token }}"

  release-windows:
    runs-on: windows-latest
    env:
      SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1  # 添加：避免 Windows 构建也遇到同样问题
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        persist-credentials: false
        path: repo
        
    - name: "Move repository to D: drive"
      run: |
        Copy-Item -Path repo -Destination D:\repo -Recurse
        Remove-Item -Path repo -Recurse -Force
        
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Install Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
        
    - name: "Configure npm to use D: drive"
      run: |
        npm config set cache D:\npm-cache
        npm config set prefix D:\npm-prefix
        
    - name: Install dependencies
      working-directory: D:\repo
      run: |
        echo "=== Removing package-lock.json to use latest git commits ==="
        Remove-Item -Path package-lock.json -Force -ErrorAction SilentlyContinue
        echo "=== Installing dependencies ==="
        npm install --loglevel=info
        
    - name: Verify scratch dependencies
      working-directory: D:\repo
      run: |
        if (!(Test-Path "node_modules\\scratch-blocks\\blockly_compressed_vertical.js")) { throw "Missing node_modules\\scratch-blocks\\blockly_compressed_vertical.js" }
        if (!(Test-Path "node_modules\\scratch-blocks\\blocks_compressed_vertical.js")) { throw "Missing node_modules\\scratch-blocks\\blocks_compressed_vertical.js" }
        if (!(Test-Path "node_modules\\@turbowarp\\scratch-l10n\\locales\\editor-msgs.js") -and !(Test-Path "node_modules\\scratch-gui\\node_modules\\@turbowarp\\scratch-l10n\\locales\\editor-msgs.js")) { throw "Missing editor-msgs.js from @turbowarp/scratch-l10n" }
        
    - name: Fetch
      working-directory: D:\repo
      run: npm run fetch
      
    - name: Compile
      working-directory: D:\repo
      run: npm run webpack:prod
      
    - name: Package
      working-directory: D:\repo
      run: |
        node release-automation/build.mjs --windows --microsoft-store --x64 --ia32 --arm64 --production
        node release-automation/build.mjs --windows-portable --x64 --production
        node release-automation/build.mjs --windows-legacy --ia32 --x64 --production

    - name: Verify Windows artifacts
      working-directory: D:\repo
      run: |
        Get-ChildItem dist\*.exe | Format-Table Name, Length
        Get-ChildItem dist\*.appx | Format-Table Name, Length
        
    - name: Print file tree
      working-directory: D:\repo
      run: node scripts/print-file-tree.mjs dist
      
    - name: Upload unsigned artifacts to GitHub Actions
      uses: actions/upload-artifact@v4
      with:
        name: windows-unsigned
        path: D:\repo\dist\*.exe
        
    - name: Upload Microsoft Store artifact to GitHub Actions
      uses: actions/upload-artifact@v4
      with:
        name: appx
        path: D:\repo\dist\*.appx
        
    - name: Upload unsigned artifacts for SignPath
      uses: actions/upload-artifact@v4
      id: signpath-unsigned
      with:
        name: artifact-for-signpath
        # 注意：这里可能是 AstraEditor-Setup 而不是 TurboWarp-Setup
        path: |
          D:\repo\dist\AstraEditor-Setup*x64.exe
          D:\repo\dist\AstraEditor-Legacy-Setup*x64.exe
          
    - name: Sign executables with SignPath
      if: ${{ env.SIGNPATH_API_TOKEN != '' }}
      uses: signpath/github-action-submit-signing-request@4f13d373e8f0cd8d3c0465ff4877feff27aed2ae
      with:
        api-token: ${{ env.SIGNPATH_API_TOKEN }}
        organization-id: 04444052-261e-46eb-8168-ed0eee93c57c
        project-slug: desktop_
        signing-policy-slug: release-signing
        github-artifact-id: ${{ steps.signpath-unsigned.outputs.artifact-id }}
        artifact-configuration-slug: sign_installers
        wait-for-completion: true
        output-artifact-directory: D:\repo\dist
        
    - name: Upload signed artifacts to GitHub Actions
      if: ${{ env.SIGNPATH_API_TOKEN != '' }}
      uses: actions/upload-artifact@v4
      with:
        name: windows-signed
        path: |
          D:\repo\dist\AstraEditor-Setup*x64.exe
          D:\repo\dist\AstraEditor-Legacy-Setup*x64.exe
          
    - name: Upload signed artifacts to tag
      working-directory: D:\repo
      run: |
        node scripts/upload-to-github-releases.mjs "${{ github.repository_owner }}" "${{ github.event.repository.name }}" "dist/*.exe"
      env:
        GH_TOKEN: "${{ github.token }}"
