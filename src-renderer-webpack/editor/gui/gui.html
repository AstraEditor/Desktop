<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Unfortunately can't really enforce a CSP due to custom extensions -->
    <script>
      // Used by scratch-extension-editor to locate its workers/chunks in builds.
      window.__SCRATCH_EXTENSION_EDITOR_PUBLIC_PATH__ = 'extension-editor/';
    </script>
    <style>
      .splash-screen {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        display: flex;
        flex-direction: row;
        gap: 1rem;
        align-items: center;
        justify-content: center;
        text-align: right;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        overflow: hidden;
      }
      .splash-screen[hidden] {
        display: none;
      }
      .splash-screen[data-theme="dark"] {
        background-color: #222;
        color: white;
      }

      .splash-screen > * {
        max-width: 80%;
      }

      .circle {
        width: 64px;
        height: 64px;
        border-radius: 200%;
        display: block;
        border-width: 1px !important;
        border-style: solid;
      }

      @keyframes circleA_1 {
        50%,
        0% {
          transform: translate(0px, 22px) scale(0.75, 0.75);
          opacity: 0;
        }

        75% {
          opacity: 1;
        }

        100% {
          transform: scale(1.95, 1.95);
        }
      }

      @keyframes circleA_2 {
        20%,
        0% {
          transform: translate(0px, -52px) scale(0.5, 0.5);
          opacity: 0;
        }

        75% {
          opacity: 1;
        }

        100% {
          transform: translate(-25px, -12px) scale(0.96, 0.96);
        }
      }

      @keyframes circleA_3 {
        30%,
        0% {
          transform: translate(0px, -112px) scale(0.26, 0.26);
          opacity: 0;
        }

        75% {
          opacity: 1;
        }

        100% {
          transform: translate(40px, -108px) scale(1.46, 1.46);
        }
      }

      #circle_1,
      #circle_2,
      #circle_3 {
        animation-duration: 1s;
        animation-iteration-count: infinite;
        animation-direction: alternate;
        transition: background-color 0.5s ease;
      }

      #circle_1 {
        animation-name: circleA_1;
      }

      #circle_2 {
        animation-name: circleA_2;
      }

      #circle_3 {
        animation-name: circleA_3;
      }

      .splash-error-title {
        font-weight: bold;
      }

      .splash-error-title a {
        color: inherit;
      }

      .splash-errors {
        font-family: monospace;
        max-height: 50vh;
        max-width: 50vw;
        overflow: auto;
        z-index: 9999;
        margin-left: auto;
        margin-top: 20px;
        margin-bottom: 20px;
        background-color: #ffffff44;
        padding: 5px;
        border-radius: 10px;
        position: relative;
      }

      .splash-error-list {
        white-space: pre-wrap;
      }

      .splash-reset {
        color: inherit;
        background: none;
        padding: 0;
        margin: 0;
        border: none;
        text-decoration: underline;
        cursor: pointer;
      }

      .splash-reset:disabled {
        opacity: 0.8;
      }

      #window-controls {
        position: fixed;
        top: 0;
        right: 0;
        z-index: 10001;
        display: flex;
        height: 48px;
        -webkit-app-region: no-drag;
      }
      #window-controls button {
        width: 46px;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        border: none;
        background: transparent;
        padding: 0;
        -webkit-app-region: no-drag;
        user-select: none;
      }
      #window-controls button:hover {
        background-color: #a1a1a18e;
      }
      #window-controls button:active {
        background-color: #a1a1a18e
      }
      #wc-close:hover {
        background-color: #e81123 !important;
      }
      #wc-close:hover path{
        fill: white !important
      }
      #wc-close:active path{
        fill: white !important
      }
      #wc-close:active {
        background-color: #bf0f1d !important;
      }
      #window-controls svg {
        width: 16px;
        height: 16px;
        pointer-events: none;
      }

      [class*=menu-bar_controlBarInner]{
        margin-right: 138px;
      }
    </style>
  </head>
  <body>
    <div id="window-controls">
      <button id="wc-minimize" title="Minimize"><svg><path d="M3 8C3 7.72386 3.22386 7.5 3.5 7.5H12.5C12.7761 7.5 13 7.72386 13 8C13 8.27614 12.7761 8.5 12.5 8.5H3.5C3.22386 8.5 3 8.27614 3 8Z" fill="var(--menu-bar-foreground)"/></svg></button>
      <button id="wc-maximize" title="Maximize"><svg><path fill-rule="evenodd" id="wc-maximize-icon" d="M4.5 3C3.67157 3 3 3.67157 3 4.5V11.5C3 12.3284 3.67157 13 4.5 13H11.5C12.3284 13 13 12.3284 13 11.5V4.5C13 3.67157 12.3284 3 11.5 3H4.5ZM4.5 4H11.5C11.7761 4 12 4.22386 12 4.5V11.5C12 11.7761 11.7761 12 11.5 12H4.5C4.22386 12 4 11.7761 4 11.5V4.5C4 4.22386 4.22386 4 4.5 4Z" fill="var(--menu-bar-foreground)"/></svg></button>
      <button id="wc-close" title="Close"><svg><path d="M2.58859 2.71569L2.64645 2.64645C2.82001 2.47288 3.08944 2.4536 3.28431 2.58859L3.35355 2.64645L8 7.293L12.6464 2.64645C12.8417 2.45118 13.1583 2.45118 13.3536 2.64645C13.5488 2.84171 13.5488 3.15829 13.3536 3.35355L8.707 8L13.3536 12.6464C13.5271 12.82 13.5464 13.0894 13.4114 13.2843L13.3536 13.3536C13.18 13.5271 12.9106 13.5464 12.7157 13.4114L12.6464 13.3536L8 8.707L3.35355 13.3536C3.15829 13.5488 2.84171 13.5488 2.64645 13.3536C2.45118 13.1583 2.45118 12.8417 2.64645 12.6464L7.293 8L2.64645 3.35355C2.47288 3.17999 2.4536 2.91056 2.58859 2.71569L2.64645 2.64645L2.58859 2.71569Z" fill="var(--menu-bar-foreground)"/></svg></button>
    </div>
    <div class="splash-screen spash-waiting-for-js" hidden>
      <div class="logo">
        <div class="circle" id="circle_1"></div>
        <div class="circle" id="circle_2"></div>
        <div class="circle" id="circle_3"></div>
      </div>
      <div>
        <div class="splash-error-title" hidden><span class="splash-error-title-text1">Something went wrong. </span><a class="splash-error-link"
            href="https://github.com/AstraEditor/desktop/issues" target="_blank" rel="noreferrer">Please report</a>
          <span class="splash-error-title-text2">with the information below.</span></div>
        <div class="splash-errors splash-error-list" hidden></div>
        <button class="splash-reset" hidden>Click here to reset caches (can fix some errors)</button>
      </div>
    </div>

    <script>
      (function () {
        'use strict';

        var logoAll = document.getElementsByClassName('logo')[0];
        logoAll.style.transform = 'scale(1.5, 1.5) translateY(40px)';

        var theme = '';
        var accent = '#0099ff';

        const Texts = {
          "zh-CN": {
            "title_1": "一些地方出错了！",
            "title_2_link": "请报告",
            "title_3": "这个错误并附上下面的信息。",
            "reset": "单击此处重置缓存（可以修复一些错误）"
          },
          "en-US": {
            "title_1": "Something went wrong. ",
            "title_2_like": "Please report",
            "title_3": "with the information below.",
            "reset": 'Click here to reset caches (can fix some errors)'
          },
          "ja": {
            "title_1": "何かが間違っています。",
            "title_2_link": "報告してください",
            "title_3": "このエラーと以下の情報。",
            "reset": "キャッシュをリセットするにはここをクリックしてください（一部のエラーを修正できます）"
          },
          "ko": {
            "title_1": "문제가 발생했습니다.",
            "title_2_link": "보고해 주세요",
            "title_3": "이 오류와 아래 정보를 함께.",
            "reset": "캐시를 재설정하려면 여기를 클릭하세요 (일부 오류를 수정할 수 있음)"
          },
          "es": {
            "title_1": "Algo salió mal.",
            "title_2_link": "Por favor informe",
            "title_3": "este error con la información a continuación.",
            "reset": "Haga clic aquí para restablecer caché (puede solucionar algunos errores)"
          },
          "fr": {
            "title_1": "Quelque chose s'est mal passé.",
            "title_2_link": "Veuillez signaler",
            "title_3": "cette erreur avec les informations ci-dessous.",
            "reset": "Cliquez ici pour réinitialiser le cache (peut corriger certaines erreurs)"
          },
          "de": {
            "title_1": "Etwas ist schiefgelaufen.",
            "title_2_link": "Bitte melden Sie",
            "title_3": "diesen Fehler mit den folgenden Informationen.",
            "reset": "Klicken Sie hier, um den Cache zurückzusetzen (kann einige Fehler beheben)"
          },
          "ru": {
            "title_1": "Что-то пошло не так.",
            "title_2_link": "Пожалуйста, сообщите",
            "title_3": "об этой ошибке с информацией ниже.",
            "reset": "Нажмите здесь, чтобы сбросить кэш (может исправить некоторые ошибки)"
          }
        }
        const getText = (id) => {
          try {
            return Texts[navigator.language][id]
          } catch (e) {
            try {
              return Texts['en-US'][id]
            } catch (e) {
              return id
            }
          }
        }

        try {
          var themeSetting = JSON.parse(localStorage.getItem('tw:theme'));
        } catch {
          // ignore
        }

        // dark, accent: ae
        theme = 'dark';
        accent = '#0099ff';

        try {
          theme = themeSetting.gui || 'dark';
          var parsed = themeSetting.accent;
          switch (parsed) {
            case ('purple'):
              accent = '#855cd6';
              break
            case ('blue'):
              accent = '#4c97ff';
              break
            case ('red'):
              accent = '#ff4c4c';
              break
            case ('rainbow'):
              accent = '#ff4c4c';
              break
            case ('ce'):
              accent = '#ff9b86';
              break
            case ('ty'):
              accent = '#66ccff';
              break
            case ('miku'):
              accent = '#39c5bb';
              break
            case ('astraeditor'):
              accent = '#0099ff';
              break
            default:
              accent = '#0099ff';

          }

          if (parsed.gui === 'dark' || parsed.gui === 'light') {
            theme = parsed.gui;
          }
        } catch (e) {
          // ignore
        }


        if (!theme) {
          theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }

        var splash = document.querySelector('.spash-waiting-for-js');
        var logo = document.getElementsByClassName('circle');
        splash.setAttribute('data-theme', theme);

        if (theme !== 'dark' && !!theme) {
          for (let element = 0; element < logo.length; element += 1) {
            logo[element].style.backgroundColor = '#ffffff50';
            logo[element].style.borderColor = '#ffffff10';
          };
          splash.style.backgroundColor = accent;
          splash.style.color = 'white';
        } else {
          splash.style.backgroundColor = '#222';
          splash.style.color = 'white';
          for (let element = 0; element < logo.length; element += 1) {
            logo[element].style.backgroundColor = '#ffffff50';
            logo[element].style.borderColor = '#ffffff10';
          };
        }

        splash.hidden = false;

        var splashErrorTitle = document.querySelector('.splash-error-title');
        var splashError = document.querySelector('.splash-errors');
        var splashReset = document.querySelector('.splash-reset');

        var splashErrorLink = document.querySelector('.splash-error-link');
        var splashErrorText1 = document.querySelector('.splash-error-title-text1');
        var splashErrorText2 = document.querySelector('.splash-error-title-text2');

        var totalErrors = 0;
        window.onerror = function (event, source, line, col, err) {
          if (++totalErrors > 5) return; // dont bother logging more
          splashErrorTitle.hidden = splashError.hidden = splashReset.hidden = false;

          splashErrorText1.textContent = getText('title_1');
          splashErrorLink.textContent = getText('title_2_link');
          splashErrorText2.textContent = getText('title_3');
          splashReset.textContent = getText('reset')

          var el = document.createElement('div');
          el.textContent = 'Error (splash) in ' + source + ' (' + line + ':' + col + '): ' + err;
          splashError.appendChild(el);
          logoAll.style.transform = 'scale(6, 6) translate(20px, 40px)';
          splash.style.backgroundColor = '#ff8888';
          splash.style.color = 'white';
          splashErrorTitle.style.color = 'white';
          for (let element = 0; element < logo.length; element += 1) {
            logo[element].style.backgroundColor = '#ffffff50';
            logo[element].style.borderColor = '#ffffff10';
          };
        };

        splashReset.onclick = function () {
          splashReset.disabled = true;
          function hardRefresh() {
            var search = location.search.replace(/[?&]nocache=[\d.]+(?=$|&)/, '');
            document.cookie = 'tw_clear_cache_once=1; max-age=60; path=/; samesite=strict; secure';
            location.replace(location.pathname + search + (search ? '&' : '?') + 'nocache=' + Math.floor(Math.random() * 10000000));
          }
          if ('serviceWorker' in navigator) {
            setTimeout(hardRefresh, 5000);
            navigator.serviceWorker.getRegistration('/')
              .then(function (registration) {
                if (registration) {
                  return registration.unregister();
                }
              })
              .then(hardRefresh)
              .catch(hardRefresh);
          } else {
            hardRefresh();
          }
        };

        window.SplashEnd = () => {
          splash.hidden = true;
          window.onerror = null;
        };
      })();

      (function () {
        var maxIcon = document.getElementById('wc-maximize-icon');
        var maxPath = 'M4.5 3C3.67157 3 3 3.67157 3 4.5V11.5C3 12.3284 3.67157 13 4.5 13H11.5C12.3284 13 13 12.3284 13 11.5V4.5C13 3.67157 12.3284 3 11.5 3H4.5ZM4.5 4H11.5C11.7761 4 12 4.22386 12 4.5V11.5C12 11.7761 11.7761 12 11.5 12H4.5C4.22386 12 4 11.7761 4 11.5V4.5C4 4.22386 4.22386 4 4.5 4Z';
        var restorePath = 'M9.8 4H5.27c.193-.334.479-.606.824-.782C6.522 3 7.082 3 8.204 3h1.6c1.12 0 1.68 0 2.11.218c.376.192.682.498.874.874c.218.428.218.988.218 2.11v1.6c0 1.12 0 1.68-.218 2.11a2 2 0 0 1-.782.824v-4.53c0-.577 0-.949-.024-1.23c-.022-.272-.06-.372-.085-.422a1 1 0 0 0-.437-.437c-.05-.025-.15-.063-.422-.085a17 17 0 0 0-1.23-.024z M3 8.2c0-1.12 0-1.68.218-2.11c.192-.376.498-.682.874-.874c.428-.218.988-.218 2.11-.218h1.6c1.12 0 1.68 0 2.11.218c.376.192.682.498.874.874c.218.428.218.988.218 2.11v1.6c0 1.12 0 1.68-.218 2.11a2 2 0 0 1-.874.874c-.428.218-.988.218-2.11.218h-1.6c-1.12 0-1.68 0-2.11-.218a2 2 0 0 1-.874-.874C3 11.482 3 10.922 3 9.8z M6.2 6h1.6c.577 0 .949 0 1.23.024c.272.022.372.06.422.085c.188.096.341.249.437.437c.025.05.063.15.085.422c.023.283.024.656.024 1.23v1.6c0 .577 0 .949-.024 1.23c-.022.272-.06.372-.085.422a1 1 0 0 1-.437.437c-.05.025-.15.063-.422.085c-.283.023-.656.024-1.23.024H6.2c-.577 0-.949 0-1.23-.024c-.272-.022-.372-.06-.422-.085a1 1 0 0 1-.437-.437c-.025-.05-.063-.15-.085-.422a17 17 0 0 1-.024-1.23v-1.6c0-.577 0-.949.024-1.23c.022-.272.06-.372.085-.422c.096-.188.249-.341.437-.437c.05-.025.15-.063.422-.085C5.253 6 5.626 6 6.2 6';

        document.getElementById('wc-minimize').onclick = function () { try { window.EditorPreload.minimizeWindow(); } catch(e) {} };
        document.getElementById('wc-maximize').onclick = function () { try { window.EditorPreload.maximizeWindow(); } catch(e) {} };
        document.getElementById('wc-close').onclick = function () { try { window.EditorPreload.closeWindow(); } catch(e) {} };

        try {
          window.EditorPreload.onMaximizeStateChanged(function (isMaximized) {
            maxIcon.setAttribute('d', isMaximized ? restorePath : maxPath);
          });
          window.EditorPreload.isMaximized().then(function (isMaximized) {
            maxIcon.setAttribute('d', isMaximized ? restorePath : maxPath);
          });
        } catch(e) {}
      })();
    </script>

    <div id="app"></div>

    <script>
      function webpackScriptError(event) {
        alert(`Error loading webpack script: ${event.target.src}`);
      }
    </script>
    <script src="index.js" onerror="webpackScriptError(event)"></script>
  </body>
</html>
